<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập Hệ Thống</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
      <!-- Tiêu đề -->
      <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-gray-800">Xin chào!</h2>
        <p class="text-gray-500 mt-2">Vui lòng đăng nhập để tiếp tục</p>
      </div>

      <!-- Form Đăng Nhập -->
      <form id="loginForm" class="space-y-6">
        <!-- Tên đăng nhập -->
        <div>
          <label
            for="username"
            class="block text-sm font-medium text-gray-700 mb-1"
            >Tên đăng nhập</label
          >
          <input
            value="bangtx@test.com"
            type="text"
            id="username"
            name="username"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
            placeholder="Nhập tài khoản của bạn"
          />
        </div>

        <!-- Mật khẩu -->
        <div>
          <label
            for="password"
            value="12345678"
            class="block text-sm font-medium text-gray-700 mb-1"
            >Mật khẩu</label
          >
          <input
            type="password"
            id="password"
            name="password"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
            placeholder="••••••••"
            value="12345678"
          />
        </div>

        <!-- Nút đăng nhập -->
        <button
          id="loginBtn"
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition duration-200 shadow-lg shadow-blue-500/20"
        >
          Đăng Nhập
        </button>
      </form>
    </div>

    <!-- Nhúng file JS xử lý logic nằm ngay cạnh file HTML này -->
    <script src="./auth.js" type="module"></script>
  </body>
</html>
