<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Đăng nhập — ShopAdmin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --blue-500:#5296d6;
    --blue-600:#3d83c4;
    --bg:#f1f5f9;
    --text:#1e293b;
    --muted:#64748b;
    --border:#e2e8f0;
    --ring:rgba(82,150,214,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
    background:var(--bg);color:var(--text);
    -webkit-font-smoothing:antialiased;
    display:grid;place-items:center;min-height:100dvh;padding:24px;
  }

  .card{
    width:100%;max-width:380px;background:#fff;
    border:1px solid var(--border);border-radius:16px;padding:36px 32px;
    box-shadow:0 10px 30px -12px rgba(15,23,42,.18);
  }

  .logo{
    display:flex;align-items:center;justify-content:center;gap:11px;
    font-size:23px;font-weight:800;letter-spacing:-.5px;margin-bottom:24px;
  }
  .logo-mark{
    width:40px;height:40px;border-radius:11px;background:var(--blue-500);
    display:grid;place-items:center;box-shadow:0 8px 18px -6px rgba(82,150,214,.7);
  }
  .logo-mark svg{width:21px;height:21px;stroke:#fff}
  .logo span{color:var(--blue-500)}

  .head{text-align:center;margin-bottom:26px}
  .head h2{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:6px}
  .head p{color:var(--muted);font-size:14px}

  .field{margin-bottom:16px}
  .field label{display:block;font-size:13.5px;font-weight:600;margin-bottom:7px}
  .input-wrap{position:relative}
  .input-wrap .lead-icon{
    position:absolute;left:13px;top:50%;transform:translateY(-50%);
    width:18px;height:18px;stroke:var(--muted);pointer-events:none;
  }
  input[type=email],input[type=password],input[type=text]{
    width:100%;height:46px;border:1px solid var(--border);border-radius:11px;background:#fff;
    padding:0 14px 0 41px;font-size:14.5px;font-family:inherit;color:var(--text);
    transition:border-color .15s,box-shadow .15s;
  }
  input::placeholder{color:#94a3b8}
  input:focus{outline:none;border-color:var(--blue-500);box-shadow:0 0 0 4px var(--ring)}
  input.has-error{border-color:#f87171;box-shadow:0 0 0 4px rgba(248,113,113,.15)}

  .toggle-pass{
    position:absolute;right:7px;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;padding:8px;border-radius:8px;
    display:grid;place-items:center;color:var(--muted);
  }
  .toggle-pass:hover{background:var(--bg)}
  .toggle-pass svg{width:18px;height:18px;stroke:currentColor}

  .forgot{text-align:right;margin:-2px 0 22px}
  .forgot a{color:var(--blue-600);font-size:13px;font-weight:600;text-decoration:none}
  .forgot a:hover{text-decoration:underline}

  .btn-primary{
    width:100%;height:48px;border:none;border-radius:11px;cursor:pointer;
    background:var(--blue-500);color:#fff;font-size:15px;font-weight:600;font-family:inherit;
    box-shadow:0 10px 22px -8px rgba(82,150,214,.6);
    transition:background .15s,transform .05s;
  }
  .btn-primary:hover{background:var(--blue-600)}
  .btn-primary:active{transform:translateY(1px)}
  .btn-primary:disabled{opacity:.7;cursor:not-allowed;transform:none}

  .alert{
    display:none;align-items:center;gap:9px;
    background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;
    border-radius:10px;padding:10px 13px;font-size:13px;font-weight:500;margin-bottom:16px;
  }
  .alert.show{display:flex}
  .alert svg{width:16px;height:16px;stroke:#b91c1c;flex-shrink:0}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <main class="card">

    <div class="logo">
      <span class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/>
        </svg>
      </span>
      Shop<span>Admin</span>
    </div>

    <div class="head">
      <h2>Đăng nhập</h2>
      <p>Nhập tài khoản để tiếp tục</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="alert" id="formAlert" role="alert" aria-live="polite">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/>
        </svg>
        <span id="formAlertText"></span>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap">
          <svg class="lead-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16v16H4z"/><path d="m22 6-10 7L2 6"/>
          </svg>
          <input id="email" name="email" type="email" placeholder="email@example.com" autocomplete="email" required />
        </div>
      </div>

      <div class="field">
        <label for="password">Mật khẩu</label>
        <div class="input-wrap">
          <svg class="lead-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="toggle-pass" id="togglePass" aria-label="Hiện mật khẩu">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="forgot"><a href="#">Quên mật khẩu?</a></div>

      <button type="submit" class="btn-primary">Đăng nhập</button>
    </form>
  </main>
  <script type="module" src="main.js"></script>
</body>
</html>
