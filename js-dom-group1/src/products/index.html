<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản Lý Sản Phẩm | ShopAdmin</title>
    <link rel="stylesheet" href="../../style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <h2>ShopAdmin</h2>
        <ul>
          <li><i class="fas fa-home"></i> Tổng quan</li>
          <li class="active"><i class="fas fa-box"></i> Sản phẩm</li>
          <li><i class="fas fa-shopping-cart"></i> Đơn hàng</li>
          <li><i class="fas fa-users"></i> Khách hàng</li>
          <li><i class="fas fa-chart-line"></i> Báo cáo</li>
        </ul>
      </aside>

      <main class="main-content">
        <header>
          <div class="search-bar">
            <input
              type="text"
              id="searchInput"
              placeholder="Tìm tên sản phẩm, mã SKU..."
            />
          </div>
          <div class="user-actions">
            <button id="btnAdd" class="btn-add">
              <i class="fas fa-plus"></i> Thêm sản phẩm
            </button>
          </div>
        </header>

        <section class="stats">
          <div class="card">
            <h3>Tổng sản phẩm</h3>
            <p id="totalProduct"></p>
          </div>
          <div class="card">
            <h3>Sắp hết hàng</h3>
            <p style="color: #e74c3c" id="lowStock"></p>
          </div>
          <div class="card">
            <h3>Danh mục</h3>
            <p id="totalCate"></p>
          </div>
        </section>

        <section class="table-container">
          <div class="table-header">
            <h3>Danh mục sản phẩm</h3>
            <div class="filters">
              <select id="cateFiltered"></select>
            </div>
          </div>
          <table>
            <thead>
              <tr>
                <th>Hình</th>
                <th>Thông tin sản phẩm</th>
                <th>Danh mục</th>
                <th>Giá bán</th>
                <th>Tồn kho</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody id="productTableBody"></tbody>
          </table>
        </section>
      </main>
    </div>

    <div class="modal">
      <div class="modal-content">
        <h3>Thêm sản phẩm mới</h3>
      </div>
    </div>
    <script type="module" src="./products.js"></script>
  </body>
</html>
